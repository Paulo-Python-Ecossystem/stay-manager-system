name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Run linter
        run: |
          flake8 .
          black --check .
          isort --check-only .

      - name: Run tests
        run: |
          python manage.py test
